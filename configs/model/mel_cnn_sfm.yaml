_target_: src.models.SFMModule

optimizer:
  _target_: torch.optim.Adam
  _partial_: true
  lr: 0.0001
  weight_decay: 1.0e-12

scheduler:
  _target_: torch.optim.lr_scheduler.CosineAnnealingLR
  _partial_: true
  # mode: min
  # factor: 0.1
  # patience: 10
  T_max: 1000
  eta_min: 0.00008

net:
  _target_: src.models.net.model.CNNModel
  k: 4
  dim: 500
  num_cls: 47
  activation: lrelu
  depth: 4
  hidden: 128
  dropout: 0.0
  mode: simplex
  prior_pseudocount: 2.0
  cls_expanded_simplex: False
  clean_data: False
  classifier: True
  classifier_free_guidance: False
