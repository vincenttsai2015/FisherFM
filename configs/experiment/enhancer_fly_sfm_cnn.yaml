# @package _global_

# to execute this experiment run:
# python train.py experiment=example

defaults:
  - override /data: enhancer
  - override /model: toy_cnn_sfm
  - override /callbacks: default
  - override /trainer: default

# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters

tags: ["enhancer", "cnn"]

seed: 12345

trainer:
  min_epochs: 1
  max_epochs: 800
  gradient_clip_val: 1.0

model:
  optimizer:
    lr: 0.001
  net:
    k: 4
    dim: 500
    activation: lrelu
    depth: 4
    hidden: 128
    dropout: 0.0
  compile: false
  manifold: sphere
  ot_method: exact
  fbd_every: 20
  eval_fbd: true
  eval_ppl: false
  mel_or_dna: false  # DNA
  fbd_classifier_path: "workdir/clsDNAclean_cnn_1stack_2023-12-30_15-01-30/epoch=15-step=10480.ckpt"
  inference_steps: 100

data:
  batch_size: 512
  dataset: MEL2

logger:
  wandb:
    tags: ${tags}
    name: enhancer_fly_s${seed}
    group: "enhancer"
    project: enhancer
  aim:
    experiment: "enhancer_mel"
