# @package _global_

# to execute this experiment run:
# python train.py experiment=example

defaults:
  - override /data: toy_dfm
  - override /model: toy_mlp_sfm
  - override /callbacks: default
  - override /trainer: default

# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters

tags: ["toy_dfm", "mlp"]

seed: 12345

trainer:
  min_epochs: 1
  max_epochs: 1000
  gradient_clip_val: 1.0
  accelerator: 'gpu'
  devices: [0]

model:
  optimizer:
    lr: 0.001
  net:
    k: ${data.k}
    dim: ${data.dim}
    num_cls: 2
  compile: false
  manifold: sphere
  kl_eval: true
  ema: true
  # label_smoothing: 0.81

data:
  batch_size: 512
  k: 4
  dim: 100
  seq_len: 100

logger:
  wandb:
    project: sfm
    tags: ${tags}
    group: "toy_dfm"
    name: "toy_cnn_sfm"
  aim:
    experiment: "toy_dfm"
